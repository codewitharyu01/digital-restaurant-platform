[phases.setup]
nixPkgs = ["python311","gcc","postgresql"]

[phases.install]
cmds = ["python -m pip install --upgrade pip ", "cd myrestu && python -m pip install -r requirements.txt"]

[phases.build]
cmds = ["cd myrestu && python manage.py collectstatic --noinput",
         "cd myrestu && python manage.py migrate --noinput"]

[start]

cmd = "cd myrestu && gunicorn myrestu.wsgi"